<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-light: #2d5a8e;
            --primary-dark: #0f2440;
            --accent: #c0392b;
            --accent-light: #e74c3c;
            --success: #27ae60;
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #dfe6e9;
            --text: #2d3436;
            --text-muted: #636e72;
            --highlight: #ffeaa7;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 0 2rem;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .nav-brand {
            color: #fff;
            font-weight: 800;
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-brand span.icon { font-size: 1.4rem; }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            background: rgba(255,255,255,0.15);
        }
        .nav-badge {
            font-size: 0.7rem;
            background: var(--accent);
            color: #fff;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            margin-right: 0.3rem;
        }

        /* ── MAIN ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── CARDS ── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--bg);
        }
        .card-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .card-header .icon { font-size: 1.3rem; }

        /* ── SEARCH BAR ── */
        .search-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .search-bar input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            direction: rtl;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(45,90,142,0.15);
        }
        .search-bar select {
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fff;
            cursor: pointer;
        }

        /* ── BUTTONS ── */
        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-accent {
            background: var(--accent);
            color: #fff;
        }
        .btn-accent:hover { background: var(--accent-light); }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-sm {
            padding: 0.4rem 0.9rem;
            font-size: 0.8rem;
        }

        /* ── RESULT ITEMS ── */
        .result-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .result-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .result-item:hover { box-shadow: var(--shadow); }

        .result-header {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem;
            cursor: pointer;
            gap: 1rem;
            user-select: none;
        }
        .result-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .result-meta {
            flex: 1;
            min-width: 0;
        }
        .result-id {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary);
        }
        .result-id small {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .result-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .result-link {
            color: var(--primary-light);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            background: var(--bg);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .result-link:hover {
            background: var(--primary);
            color: #fff;
        }
        .result-toggle {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: transform 0.3s;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }
        .result-toggle.open { transform: rotate(90deg); color: var(--accent); }

        .result-body {
            display: none;
            padding: 0 1.25rem 1.25rem;
            border-top: 1px solid var(--border);
        }
        .result-body.open { display: block; }

        .result-section {
            margin-top: 1rem;
        }
        .result-section-label {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .result-section-label::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }
        .result-section-text {
            text-align: justify;
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 2;
            max-height: 400px;
            overflow-y: auto;
        }
        .similarity-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        mark {
            background: var(--highlight);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-chip strong { color: var(--primary); }

        /* ── LOADING ── */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── PAGINATION ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            padding: 1.5rem 0;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 0.4rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: var(--bg);
            border-color: var(--primary-light);
        }
        .pagination button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.95rem; }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }
        .tab {
            padding: 0.75rem 1.5rem;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab:hover { color: var(--primary); }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── ALERTS ── */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .alert-warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
        }
        .alert-info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .nav-inner { padding: 0; }
            .search-bar { flex-direction: column; }
            .result-header { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <div class="nav-brand">
                <span class="icon">⚖️</span>
                <span>{{ app_title }}</span>
            </div>
            <div class="nav-links">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">خانه</a>
                <a href="/search" class="{% if request.url.path == '/search' %}active{% endif %}">جستجو</a>
                <a href="/chat" class="{% if request.url.path == '/chat' %}active{% endif %}">
                    گفتگو
                    {% if ai_available %}<span class="nav-badge">AI</span>{% endif %}
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
